<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConvertX | Private File Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>ConvertX</h1>
            <p>Convert images locally. No server, no limits.</p>
        </header>

        <div class="tool-box">
            <div class="format-selector">
                <label>Convert to:</label>
                <select id="output-format">
                    <option value="image/webp">WebP</option>
                    <option value="image/jpeg">JPG</option>
                    <option value="image/png">PNG</option>
                </select>
            </div>

            <div class="drop-zone" id="drop-zone">
                <p>Drag & Drop file to convert</p>
                <input type="file" id="file-input" hidden>
            </div>

            <div id="status" class="status"></div>

            <div id="result" class="hidden">
                <div class="file-info">
                    <span id="file-name"></span>
                    <span class="arrow">→</span>
                    <span id="new-format-label"></span>
                </div>
                <a id="download-btn" class="btn">Download Converted File</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
